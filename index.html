<script>
    function toggleMenu() {
        const menu = document.getElementById('mobile-menu');
        const icon = document.getElementById('menu-icon');
        menu.classList.toggle('hidden');
        icon.style.transform = menu.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(90deg)';
    }

    async function fetchMyGames() {
        const cfg = portfolioConfig;
        const placeIds = cfg.manualGames.map(g => g.placeId);
        if (placeIds.length === 0) return;

        try {
            const placeIdsStr = placeIds.join(',');

            // 1. Get place details (name, description, universeId)
            const placeRes = await fetch(`https://games.roproxy.com/v1/games/multiget-place-details?placeIds=${placeIdsStr}`);
            const placeData = await placeRes.json();

            // 2. Get thumbnails
            const iconRes = await fetch(`https://thumbnails.roproxy.com/v1/places/icons?placeIds=${placeIdsStr}&size=512x512&format=Png`);
            const iconData = await iconRes.json();

            // 3. Get stats (CCU + visits) using universeIds
            const universeIds = placeData.data.map(p => p.universeId).join(',');
            const statsRes = await fetch(`https://games.roproxy.com/v1/games?universeIds=${universeIds}`);
            const statsData = await statsRes.json();

            // Build full game objects
            let totalPlaying = 0;
            let totalVisits = 0;

            const gamesHtml = placeData.data.map(p => {
                const stats = statsData.data.find(s => s.universeId === p.universeId) || { playing: 0, visits: 0 };
                const icon = iconData.data.find(i => i.targetId === p.placeId) || {};
                
                totalPlaying += stats.playing || 0;
                totalVisits += stats.visits || 0;

                return `
                <div class="glass rounded-[1.5rem] md:rounded-[2rem] overflow-hidden flex flex-col group border border-white/5">
                    <div class="img-container"><img src="${icon.imageUrl || 'https://www.roblox.com/asset/?id=0'}" alt="${p.name}"></div>
                    <div class="p-6 md:p-8 text-left">
                        <h3 class="text-2xl md:text-3xl font-black mb-2 italic uppercase tracking-tighter text-white">${p.name}</h3>
                        <p class="opacity-60 text-sm italic mb-6 desc-truncate">${p.description || 'No description provided.'}</p>
                        
                        <div class="game-stat flex justify-between text-xs mb-4">
                            <div><span class="text-emerald-400">CCU</span> <span class="font-black">${(stats.playing || 0).toLocaleString()}</span></div>
                            <div><span class="text-blue-400">Visits</span> <span class="font-black">${(stats.visits || 0).toLocaleString()}</span></div>
                        </div>
                        
                        <a href="https://www.roblox.com/games/${p.placeId}" target="_blank" 
                           class="font-black text-xs uppercase" style="color:var(--accent)">Launch Experience →</a>
                    </div>
                </div>`;
            }).join('');

            // Groups (extraProjects)
            const groupsHtml = cfg.extraProjects.map(p => `
                <div class="glass rounded-[1.5rem] md:rounded-[2rem] overflow-hidden flex flex-col group border border-white/5">
                    <div class="img-container"><img src="${p.image}" onerror="this.src='https://www.roblox.com/asset/?id=0'"></div>
                    <div class="p-6 md:p-8 text-left">
                        <h3 class="text-2xl md:text-3xl font-black mb-2 italic uppercase tracking-tighter text-white">${p.name}</h3>
                        <p class="opacity-60 text-sm italic mb-6 desc-truncate">${p.desc}</p>
                        <a href="${p.link}" target="_blank" class="font-black text-xs uppercase" style="color:var(--accent)">Join Group →</a>
                    </div>
                </div>`).join('');

            // Put everything in the grid
            document.getElementById('work-grid').innerHTML = groupsHtml + gamesHtml;

            // Update top total stats
            document.getElementById('total-playing').innerText = totalPlaying.toLocaleString();
            document.getElementById('total-visits').innerText = totalVisits.toLocaleString();

        } catch (e) {
            console.error("Failed to load games:", e);
            document.getElementById('work-grid').innerHTML = `<p class="text-center text-red-400">Could not load games right now. Please try refreshing.</p>`;
        }
    }

    function initPortfolio() {
        const cfg = portfolioConfig;
        
        // Colors
        document.documentElement.style.setProperty('--accent', cfg.accentHex);
        document.documentElement.style.setProperty('--bg', cfg.backgroundColor);
        document.documentElement.style.setProperty('--text', cfg.textColor);
        
        // Basic info
        document.title = cfg.name + " | Roblox Game Developer";
        document.getElementById('meta-desc').content = "My Roblox games: Jetpack over LAVA, Dead Meals, 99 Nights Zombie Tower Defense, and more!";
        document.getElementById('nav-name').innerText = cfg.name;
        document.getElementById('footer-name').innerText = cfg.name;
        document.getElementById('copyright').innerText = `© ${new Date().getFullYear()} KingTim17287`;

        // Render links
        const lGrid = document.getElementById('links-grid');
        lGrid.innerHTML = '';
        Object.entries(cfg.links).forEach(([label, url]) => {
            const a = document.createElement('a');
            a.href = url; a.target = "_blank";
            a.className = "glass p-6 rounded-2xl flex justify-between items-center group hover:bg-white/5 transition-all";
            a.innerHTML = `<span class="font-black italic uppercase text-xl">${label}</span><span style="color:var(--accent)">→</span>`;
            lGrid.appendChild(a);
        });

        // Load only your 8 games + groups
        fetchMyGames();
    }

    document.addEventListener('DOMContentLoaded', initPortfolio);
</script>

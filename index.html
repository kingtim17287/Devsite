<script>
    async function load() {
        const cfg = portfolioConfig;
        document.documentElement.style.setProperty('--accent', cfg.accentHex);
        document.getElementById('nav-name').innerText = cfg.name;

        // 1. Still use the old API just for the avatar (it still works)
        let avatarSrc = '';
        try {
            const res = await fetch(`https://api.un6107617.dev/portfolio/${cfg.userId}`);
            const data = await res.json();
            if (data.user?.avatar) avatarSrc = data.user.avatar;
        } catch (e) {
            console.warn("Avatar fetch failed (optional)", e);
        }
        if (avatarSrc) document.getElementById('avatar-img').src = avatarSrc;

        // 2. NEW: Dynamically fetch your real games using the Place IDs you already have
        const gamesPromises = cfg.manualGames.map(async (placeId) => {
            try {
                // Step A: Place ID → Universe ID (exactly the API from your screenshot)
                const univRes = await fetch(`https://apis.roproxy.com/universes/v1/places/${placeId}/universe`);
                const univData = await univRes.json();
                const universeId = univData.universeId;

                // Step B: Get name, description, live CCU, visits, etc.
                const gameRes = await fetch(`https://games.roproxy.com/v1/games?universeIds=${universeId}`);
                const gameData = await gameRes.json();
                if (!gameData.data || !gameData.data[0]) return null;
                const g = gameData.data[0];

                // Step C: Get thumbnail
                const thumbRes = await fetch(`https://thumbnails.roproxy.com/v1/games/icons?universeIds=${universeId}&size=512x512&format=Png`);
                const thumbData = await thumbRes.json();
                const thumbnail = thumbData.data && thumbData.data[0] ? thumbData.data[0].imageUrl : '';

                return {
                    placeId: g.rootPlaceId || placeId,
                    name: g.name,
                    description: g.description || 'No description',
                    playing: g.playing || 0,
                    visits: g.visits || 0,
                    thumbnail: thumbnail
                };
            } catch (e) {
                console.error(`Failed to load game ${placeId}`, e);
                return null;
            }
        });

        const filteredGames = (await Promise.all(gamesPromises)).filter(Boolean);

        // Render games (same HTML as before)
        let gamesHTML = '';
        if (filteredGames.length > 0) {
            gamesHTML = filteredGames.map(g => `
                <div class="glass rounded-3xl overflow-hidden flex flex-col group">
                    <div class="img-container">
                        <img src="${g.thumbnail}" alt="${g.name}">
                    </div>
                    <div class="p-8">
                        <h3 class="text-2xl font-black mb-2">${g.name}</h3>
                        <p class="opacity-70 mb-6">${g.description}</p>
                        <div class="flex justify-between text-xs mb-6">
                            <div>CCU <span class="font-black text-emerald-400">${g.playing.toLocaleString()}</span></div>
                            <div>Visits <span class="font-black text-blue-400">${g.visits.toLocaleString()}</span></div>
                        </div>
                        <a href="https://www.roblox.com/games/${g.placeId}" target="_blank"
                           class="font-black text-xs uppercase block text-center py-3 rounded-2xl hover:bg-white/10 transition"
                           style="color:var(--accent)">PLAY →</a>
                    </div>
                </div>
            `).join('');
        } else {
            gamesHTML = `<p class="col-span-full text-center py-12 text-amber-400">No matching games found.<br>Double-check your manualGames IDs in the config.</p>`;
        }
        document.getElementById('games-grid').innerHTML = gamesHTML;

        // Total stats (now live!)
        const totalPlaying = filteredGames.reduce((sum, g) => sum + (g.playing || 0), 0);
        const totalVisits = filteredGames.reduce((sum, g) => sum + (g.visits || 0), 0);
        document.getElementById('total-playing').innerText = totalPlaying.toLocaleString();
        document.getElementById('total-visits').innerText = totalVisits.toLocaleString();

        // Communities (unchanged)
        const groupsHTML = cfg.groups.map(g => `
            <div class="glass rounded-3xl overflow-hidden flex flex-col group">
                <div class="img-container">
                    <img src="https://thumbnails.roproxy.com/v1/groups/icons?groupIds=${g.id}&size=420x420&format=Png" alt="${g.name}">
                </div>
                <div class="p-8">
                    <h3 class="text-2xl font-black mb-2">${g.name}</h3>
                    <p class="opacity-70 mb-6">${g.desc}</p>
                    <a href="${g.link}" target="_blank"
                       class="font-black text-xs uppercase block text-center py-3 rounded-2xl hover:bg-white/10 transition"
                       style="color:var(--accent)">JOIN GROUP →</a>
                </div>
            </div>
        `).join('');
        document.getElementById('groups-grid').innerHTML = groupsHTML;
    }

    document.addEventListener('DOMContentLoaded', load);
</script>

    <style>
        :root { --accent: #3b82f6; --bg: #0b1120; --text: #f8fafc; }

</head>
<body class="antialiased">

<script>

        name: "KingTim17287",

</script>

<nav class="fixed top-0 w-full z-50 py-5 px-6 glass">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
        <span id="nav-name" class="font-black text-3xl italic uppercase tracking-tighter" style="color:var(--accent)">KINGTIM17287</span>

</nav>

<div class="pt-32 pb-20 px-6 max-w-6xl mx-auto">

    <!-- AVATAR (exact same method as original template) -->

        <img id="avatar-img" class="w-64 h-64 mx-auto rounded-full border-8 shadow-2xl avatar-float" style="border-color:var(--accent)" alt="">

    <!-- TOTAL STATS -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-16">

            <div id="total-playing" class="text-6xl font-black italic text-emerald-400">0</div>

            <div id="total-visits" class="text-6xl font-black italic text-blue-400">0</div>
            <p class="uppercase text-sm tracking-widest text-blue-400/80 mt-2">TOTAL VISITS</p>
        </div>
    </div>

    <!-- MY GAMES FIRST -->
    <section class="mb-16">
        <div class="flex items-center gap-3 mb-8">

        </div>
        <div id="games-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>

    <!-- MY COMMUNITIES -->

        <div class="flex items-center gap-3 mb-8">
            <div class="h-8 w-2" style="background:var(--accent)"></div>

        </div>
        <div id="groups-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
    </section>

</div>

<footer class="glass py-8 text-center text-xs font-bold">© 2026 KingTim17287 • Template by UN6107617</footer>

<script>
    async function load() {
        const cfg = window.cfg;

        // Avatar (exact same as original template)
        document.getElementById('avatar-img').src = `https://thumbnails.roproxy.com/v1/users/avatar-headshot?userIds=${cfg.userId}&size=420x420&format=Png&isCircular=true`;

        document.documentElement.style.setProperty('--accent', cfg.accentHex);
        document.getElementById('nav-name').innerText = cfg.name;

        // === GROUPS (using original template's thumbnail method) ===
        const groupsHTML = cfg.groups.map(g => `
            <div class="glass rounded-3xl overflow-hidden flex flex-col group">
                <div class="img-container">
                    <img src="https://thumbnails.roproxy.com/v1/groups/icons?groupIds=${g.id}&size=420x420&format=Png" alt="${g.name}">
                </div>
                <div class="p-8">
                    <h3 class="text-2xl font-black mb-2">${g.name}</h3>
                    <p class="opacity-70 mb-6">${g.desc}</p>
                    <a href="${g.link}" target="_blank" class="font-black text-xs uppercase block text-center" style="color:var(--accent)">JOIN GROUP →</a>
                </div>
            </div>`).join('');
        document.getElementById('groups-grid').innerHTML = groupsHTML;

        // === GAMES (using the same thumbnail method as original template + roproxy stats) ===
        const placeIds = cfg.manualGames.map(g => g.placeId).join(',');
        try {
            const [detailsRes, thumbsRes, statsRes] = await Promise.all([
                fetch(`https://games.roproxy.com/v1/games/multiget-place-details?placeIds=${placeIds}`),
                fetch(`https://thumbnails.roproxy.com/v1/places/icons?placeIds=${placeIds}&size=512x512&format=Png`),
                fetch(`https://games.roproxy.com/v1/games?universeIds=${(await (await fetch(`https://games.roproxy.com/v1/games/multiget-place-details?placeIds=${placeIds}`)).json()).data.map(p => p.universeId).join(',')}`)
            ]);

            const details = await detailsRes.json();
            const thumbs = await thumbsRes.json();
            const statsData = await statsRes.json();

            let totalPlaying = 0;
            let totalVisits = 0;

            const gamesHTML = details.data.map(p => {
                const stat = statsData.data.find(s => s.universeId === p.universeId) || { playing: 0, visits: 0 };
                const thumb = thumbs.data.find(t => t.targetId === p.placeId) || {};
                totalPlaying += stat.playing || 0;
                totalVisits += stat.visits || 0;

                return `
                <div class="glass rounded-3xl overflow-hidden flex flex-col group">
                    <div class="img-container"><img src="${thumb.imageUrl}"></div>
                    <div class="p-8">
                        <h3 class="text-2xl font-black mb-2">${p.name}</h3>
                        <p class="opacity-70 mb-6">${p.description || 'No description'}</p>
                        <div class="flex justify-between text-xs mb-6">
                            <div>CCU <span class="font-black text-emerald-400">${stat.playing.toLocaleString()}</span></div>
                            <div>Visits <span class="font-black text-blue-400">${stat.visits.toLocaleString()}</span></div>
                        </div>
                        <a href="https://www.roblox.com/games/${p.placeId}" target="_blank" class="font-black text-xs uppercase block text-center" style="color:var(--accent)">PLAY →</a>
                    </div>
                </div>`;
            }).join('');

            document.getElementById('games-grid').innerHTML = gamesHTML;
            document.getElementById('total-playing').innerText = totalPlaying.toLocaleString();
            document.getElementById('total-visits').innerText = totalVisits.toLocaleString();

        } catch (e) {
            console.error(e);
            document.getElementById('games-grid').innerHTML = `<p class="text-red-400 text-center py-12">Could not load games — please refresh.</p>`;
        }
    }

    document.addEventListener('DOMContentLoaded', load);
</script>
</body>
</html>

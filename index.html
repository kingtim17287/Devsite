<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KingTim17287 | Roblox Game Developer</title>
    <meta name="description" id="meta-desc" content="My Roblox games: Jetpack over LAVA, Dead Meals, 99 Nights Zombie Tower Defense and more!">
    <link id="favicon" rel="icon" type="image/png" href="">
    <meta property="og:title" id="og-title" content="KingTim17287 | Roblox Game Developer">
    <meta property="og:description" id="og-desc" content="My Roblox games: Jetpack over LAVA, Dead Meals, 99 Nights Zombie Tower Defense and more!">
    <meta property="og:image" id="og-img" content="">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent: #3b82f6; --bg: #0b1120; --text: #f8fafc; }
        body { background-color: var(--bg); color: var(--text); scroll-behavior: smooth; overflow-x: hidden; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .img-container { position: relative; width: 100%; aspect-ratio: 16/9; overflow: hidden; background: rgba(0,0,0,0.2); }
        .img-container img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .group:hover .img-container img { transform: scale(1.05); }
        .desc-truncate { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .stat-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
        .avatar-float { animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    </style>
</head>
<body class="antialiased tracking-tight">
<script>
    const portfolioConfig = {
        userId: "3808496324",
        name: "KingTim17287",
        accentHex: "#3b82f6",
        backgroundColor: "#0b1120",
        textColor: "#f8fafc",
        avatarAnimation: "Yes",
        // Only fetch and display these specific IDs (can be Place IDs or Universe IDs)
        manualGames: [106988495261000, 77942507005261, 95744979554149, 104877476991790, 14044594226, 82126039807655, 101246660655753, 108311894104237],
        // Your 3 groups
        groups: [
            { name: "Boden Interactive", desc: "Official Group - Join for updates & events!", id: "426353491", link: "https://www.roblox.com/communities/426353491/Boden-Interactive#!/about" },
            { name: "Woven Productions", desc: "Official Group - Join for updates & events!", id: "7457551", link: "https://www.roblox.com/communities/7457551/Woven-Productions#!/about" },
            { name: "StarWoven Productions", desc: "Official Group - Join for updates & events!", id: "35252165", link: "https://www.roblox.com/communities/35252165/StarWoven-Productions#!/about" }
        ],
        links: {
            "Roblox": "https://www.roblox.com/users/3808496324/profile",
            "GitHub": "https://github.com/kingtim17287"
        }
    };
</script>
<nav class="fixed top-0 w-full z-50 py-3 md:py-5 px-4 md:px-6 glass">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
        <span id="nav-name" class="font-black text-2xl italic uppercase tracking-tighter" style="color: var(--accent);">KINGTIM17287</span>
    </div>
</nav>
<div class="pt-32 pb-20 px-6 max-w-6xl mx-auto">
    <div class="text-center mb-12">
        <div id="avatar-container" class="relative inline-block avatar-float">
            <img id="avatar-img" class="w-64 h-64 rounded-full border-8 shadow-2xl object-cover" style="border-color: var(--accent);">
        </div>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-16">
        <div class="stat-card rounded-3xl p-8 text-center">
            <div id="total-playing" class="text-6xl font-black italic text-emerald-400">0</div>
            <p class="uppercase text-sm tracking-widest text-emerald-400/80 mt-2">PLAYERS PLAYING MY GAMES</p>
        </div>
        <div class="stat-card rounded-3xl p-8 text-center">
            <div id="total-visits" class="text-6xl font-black italic text-blue-400">0</div>
            <p class="uppercase text-sm tracking-widest text-blue-400/80 mt-2">TOTAL VISITS</p>
        </div>
    </div>
    <section class="mb-16">
        <div class="flex items-center gap-3 mb-8">
            <div class="h-8 w-2" style="background:var(--accent)"></div>
            <h2 class="text-4xl font-black italic uppercase tracking-tighter">MY GAMES</h2>
        </div>
        <div id="games-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
    </section>
    <section>
        <div class="flex items-center gap-3 mb-8">
            <div class="h-8 w-2" style="background:var(--accent)"></div>
            <h2 class="text-4xl font-black italic uppercase tracking-tighter">MY COMMUNITIES</h2>
        </div>
        <div id="groups-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
    </section>
</div>
<footer class="glass mt-20 border-t border-white/5 py-10 text-center">
    <div class="text-xs font-bold">© 2026 KingTim17287 • Fixed by AI</div>
</footer>

<script>
    async function load() {
        const cfg = portfolioConfig;
        document.documentElement.style.setProperty('--accent', cfg.accentHex);
        document.getElementById('nav-name').innerText = cfg.name;

        try {
            // 1. Fetch User Avatar via standard Proxy
            const avatarRes = await fetch(`https://thumbnails.roproxy.com/v1/users/avatar-headshot?userIds=${cfg.userId}&size=420x420&format=Png&isCircular=false`);
            const avatarData = await avatarRes.json();
            if (avatarData.data && avatarData.data.length > 0) {
                document.getElementById('avatar-img').src = avatarData.data[0].imageUrl;
            }

            // 2. Fetch User & Group Games to find the matches
            let allGames = [];
            
            // Get personal games
            const userGamesRes = await fetch(`https://games.roproxy.com/v2/users/${cfg.userId}/games?limit=50`);
            const userGamesData = await userGamesRes.json();
            if (userGamesData.data) allGames.push(...userGamesData.data);

            // Get group games
            for (const group of cfg.groups) {
                const groupGamesRes = await fetch(`https://games.roproxy.com/v2/groups/${group.id}/games?limit=50`);
                const groupGamesData = await groupGamesRes.json();
                if (groupGamesData.data) allGames.push(...groupGamesData.data);
            }

            // 3. Filter down to only the games in the manual array
            const allowed = new Set(cfg.manualGames);
            const filteredGames = allGames.filter(g => allowed.has(Number(g.rootPlaceId)) || allowed.has(Number(g.id)));

            // 4. Fetch Game Thumbnails and Render
            if (filteredGames.length > 0) {
                const universeIds = filteredGames.map(g => g.id).join(',');
                const thumbRes = await fetch(`https://thumbnails.roproxy.com/v1/games/icons?universeIds=${universeIds}&returnPolicy=PlaceHolder&size=512x512&format=Png&isCircular=false`);
                const thumbData = await thumbRes.json();
                
                // Map the images to their Universe ID so they sync up properly
                const thumbMap = {};
                if (thumbData.data) {
                    thumbData.data.forEach(t => thumbMap[t.targetId] = t.imageUrl);
                }

                let gamesHTML = filteredGames.map(g => `
                    <div class="glass rounded-3xl overflow-hidden flex flex-col group">
                        <div class="img-container"><img src="${thumbMap[g.id] || ''}"></div>
                        <div class="p-8 flex flex-col flex-grow">
                            <h3 class="text-2xl font-black mb-2">${g.name}</h3>
                            <p class="opacity-70 mb-6 desc-truncate flex-grow">${g.description || 'No description provided.'}</p>
                            <div class="flex justify-between text-xs mb-6">
                                <div>CCU <span class="font-black text-emerald-400">${(g.playing || 0).toLocaleString()}</span></div>
                                <div>Visits <span class="font-black text-blue-400">${(g.visits || 0).toLocaleString()}</span></div>
                            </div>
                            <a href="https://www.roblox.com/games/${g.rootPlaceId}" target="_blank" class="font-black text-xs uppercase block text-center" style="color:var(--accent)">PLAY →</a>
                        </div>
                    </div>`).join('');
                document.getElementById('games-grid').innerHTML = gamesHTML;

                // Update Total Stats
                const totalPlaying = filteredGames.reduce((sum, g) => sum + (g.playing || 0), 0);
                const totalVisits = filteredGames.reduce((sum, g) => sum + (g.visits || 0), 0);
                document.getElementById('total-playing').innerText = totalPlaying.toLocaleString();
                document.getElementById('total-visits').innerText = totalVisits.toLocaleString();
            } else {
                document.getElementById('games-grid').innerHTML = `<p class="col-span-2 text-center text-white/50 py-12">No games found. Double-check your manualGames IDs.</p>`;
            }

            // 5. Fetch Group Icons by extracting JSON properly
            const groupIds = cfg.groups.map(g => g.id).join(',');
            const groupThumbRes = await fetch(`https://thumbnails.roproxy.com/v1/groups/icons?groupIds=${groupIds}&size=420x420&format=Png`);
            const groupThumbData = await groupThumbRes.json();
            
            const groupThumbMap = {};
            if (groupThumbData.data) {
                groupThumbData.data.forEach(t => groupThumbMap[t.targetId] = t.imageUrl);
            }

            const groupsHTML = cfg.groups.map(g => `
                <div class="glass rounded-3xl overflow-hidden flex flex-col group">
                    <div class="img-container">
                        <img src="${groupThumbMap[g.id] || ''}" alt="${g.name}">
                    </div>
                    <div class="p-8 flex flex-col flex-grow">
                        <h3 class="text-2xl font-black mb-2">${g.name}</h3>
                        <p class="opacity-70 mb-6 desc-truncate flex-grow">${g.desc}</p>
                        <a href="${g.link}" target="_blank" class="font-black text-xs uppercase block text-center mt-auto" style="color:var(--accent)">JOIN GROUP →</a>
                    </div>
                </div>`).join('');
            document.getElementById('groups-grid').innerHTML = groupsHTML;

        } catch (e) {
            console.error(e);
            document.getElementById('games-grid').innerHTML = `<p class="text-red-400 text-center py-12 col-span-2">Could not connect to Roblox Servers. Please refresh.</p>`;
        }
    }
    document.addEventListener('DOMContentLoaded', load);
</script>
</body>
</html>
